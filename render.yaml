# Render Blueprint - Dashboard Bochile (api + ui)
# bochile-rag y bochile-n8n ya estan deployados aparte, NO los re-creamos aca.
# Backup de la versión completa en render.full.yaml.

services:
  - type: web
    name: bochile-dashboard-api
    runtime: node
    plan: starter
    rootDir: apps/dashboard-api
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_CREDS_JSON
        sync: false
      - key: PORT
        value: '3002'
      - key: ALLOW_ORIGIN
        fromService:
          name: bochile-dashboard-ui
          type: web
          property: hostport
      - key: CACHE_TTL_SECONDS
        value: '30'
    healthCheckPath: /api/health

  - type: web
    name: bochile-dashboard-ui
    runtime: static
    rootDir: apps/dashboard-ui
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: bochile-dashboard-api
          type: web
          property: hostport
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
