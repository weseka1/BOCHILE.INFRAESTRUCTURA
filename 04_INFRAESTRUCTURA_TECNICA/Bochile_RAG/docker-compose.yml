# =============================================================
#  IMPORTANTE: este compose NO se usa en localhost.
#  El founder ya tiene un contenedor Qdrant corriendo (puerto 6333)
#  compartido con otros proyectos. Bochile reusa esa instancia
#  creando su propia coleccion `bochile_properties` (las collections
#  estan aisladas, no hay conflicto).
#
#  Este archivo queda para la migracion a Render (fase 2):
#  Render levanta un Qdrant dedicado por servicio.
# =============================================================
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bochile-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST HTTP API (que usa n8n via HTTP Request)
      - "6334:6334"   # gRPC (opcional)
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
      # Auth opcional para producción (Render). En local lo dejamos sin auth.
      # QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/6333 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  qdrant_storage:
    driver: local
